name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies -scheme worK

      - name: Trust Swift Macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Build Release
        run: |
          xcodebuild -scheme worK \
            -configuration Release \
            -archivePath build/worK.xcarchive \
            -skipMacroValidation \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export Archive
        run: |
          mkdir -p build/Release
          cp -R build/worK.xcarchive/Products/Applications/worK.app build/Release/

      - name: Create ZIP for Distribution
        run: |
          cd build/Release
          zip -r ../../worK.zip worK.app
          cd ../..

      - name: Install Sparkle Tools
        run: |
          # Download and extract Sparkle tools
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.0/Sparkle-2.6.0.tar.xz -o sparkle.tar.xz
          tar -xf sparkle.tar.xz
          chmod +x bin/generate_appcast
          chmod +x bin/sign_update

      - name: Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: worK.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Write private key to file so generate_appcast can sign
          echo "$SPARKLE_PRIVATE_KEY" > sparkle_key.txt

          # Put the zip in an isolated folder so generate_appcast doesn't
          # pick up sparkle.tar.xz or other bundles in the working directory
          mkdir -p appcast_input
          cp worK.zip appcast_input/

          ./bin/generate_appcast appcast_input/ \
            -f sparkle_key.txt \
            --download-url-prefix "https://github.com/jonathalimax/worK/releases/download/v${{ steps.version.outputs.VERSION }}/" \
            -o appcast.xml

          rm sparkle_key.txt

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add appcast.xml
          git commit -m "Update appcast for version ${{ steps.version.outputs.VERSION }}" || echo "No changes to appcast"
          git push origin HEAD:main || echo "Failed to push appcast update"
