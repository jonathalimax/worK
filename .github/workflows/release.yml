name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies -scheme worK

      - name: Trust Swift Macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Build Release
        run: |
          xcodebuild -scheme worK \
            -configuration Release \
            -archivePath build/worK.xcarchive \
            -skipMacroValidation \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export Archive
        run: |
          mkdir -p build/Release
          cp -R build/worK.xcarchive/Products/Applications/worK.app build/Release/

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG for Distribution
        run: |
          create-dmg \
            --volname "worK" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "worK.app" 150 190 \
            --hide-extension "worK.app" \
            --app-drop-link 450 190 \
            worK.dmg \
            build/Release/worK.app

      - name: Install Sparkle Tools
        run: |
          # Download and extract Sparkle tools
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.0/Sparkle-2.6.0.tar.xz -o sparkle.tar.xz
          tar -xf sparkle.tar.xz
          chmod +x bin/generate_appcast
          chmod +x bin/sign_update

      - name: Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: worK.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DOWNLOAD_URL="https://github.com/jonathalimax/worK/releases/download/v${VERSION}/worK.dmg"
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          # Sign the dmg with EdDSA key — outputs: sparkle:edSignature="..." length="..."
          echo "$SPARKLE_PRIVATE_KEY" > sparkle_key.txt
          SIGNATURE=$(./bin/sign_update worK.dmg -f sparkle_key.txt)
          rm sparkle_key.txt

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>worK Changelog</title>
              <link>https://raw.githubusercontent.com/jonathalimax/worK/main/appcast.xml</link>
              <description>Most recent changes for worK</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <link>https://github.com/jonathalimax/worK/releases</link>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${DATE}</pubDate>
                <enclosure url="${DOWNLOAD_URL}"
                           type="application/octet-stream"
                           ${SIGNATURE} />
              </item>
            </channel>
          </rss>
          EOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add appcast.xml
          git commit -m "Update appcast for version ${VERSION}" || echo "No changes to appcast"
          git push origin HEAD:main || echo "Failed to push appcast update"
